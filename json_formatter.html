<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JSON formatter</title>
  <link rel="icon" href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="14" fill="%23ffffff"/><rect x="2" y="2" width="60" height="60" rx="12" fill="none" stroke="%23e5e7eb" stroke-width="2"/><text x="50%25" y="50%25" dominant-baseline="middle" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="52" font-weight="800" fill="%230f172a">{}</text></svg>' />
  <style>
    :root {
      --bg: #ffffff;
      --panel: #ffffff;
      --panel-soft: #fafafa;
      --text: #334155;
      --muted: #64748b;
      --border: #e5e7eb;
      --button: #ffffff;
      --button-hover: #f8fafc;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      --radius: 16px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      --sans: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      --key: #0f172a;
      --string: #047857;
      --number: #1d4ed8;
      --boolean: #7c3aed;
      --null: #dc2626;
      --toggle: #64748b;
      --active-border: #22c55e;
      --active-text: #15803d;
      --active-bg: #f0fdf4;
      --disabled-editor-bg: #f3f4f6;
      --code-line-height: 20px;
      --code-padding-y: 14px;
    }

    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--sans); }
    .container { width: 100%; max-width: none; margin: 0; padding: 0; }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 20px 20px 0;
      margin-bottom: 16px;
    }

    h1 { margin: 0; font-size: 28px; line-height: 1.1; color: #111827; }

    .app-actions, .panel-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(360px, 1fr) minmax(420px, 1.1fr);
      gap: 16px;
      padding: 0;
    }

    .layout.json-hidden {
      grid-template-columns: 1fr;
    }

    .layout.json-hidden #jsonPanel {
      display: none;
    }

    .layout.tree-hidden {
      grid-template-columns: 1fr;
    }

    .layout.tree-hidden #treePanel {
      display: none;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      min-width: 0;
    }

    .panel-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      background: var(--panel-soft);
      min-width: 0;
      min-height: 64px;
    }

    .panel-title-row {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      flex: 1 1 auto;
      overflow: hidden;
    }

    .panel-title {
      font-weight: 700;
      font-size: 14px;
      color: #374151;
      letter-spacing: .02em;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .status {
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    .status.ok { color: #047857; }
    .status.error { color: #b91c1c; }

    .panel-body { padding: 0; }

    button {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--button);
      color: #374151;
      border-radius: 10px;
      cursor: pointer;
      transition: .15s ease;
    }

    button:hover { background: var(--button-hover); transform: translateY(-1px); }
    button:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    .icon-btn {
      width: 34px;
      height: 34px;
      min-width: 34px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .icon-btn.active,
    .toggle-group .icon-btn.active {
      border-color: var(--active-border);
      color: var(--active-text);
      background: var(--active-bg);
    }

    .toggle-group {
      display: inline-flex;
      align-items: center;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
    }

    .toggle-group .icon-btn {
      border: none;
      border-radius: 0;
    }

    .toggle-group .icon-btn + .icon-btn {
      border-left: 1px solid var(--border);
    }

    .action-btn {
      min-height: 34px;
      padding: 0 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .btn-icon {
      width: 16px;
      height: 16px;
      display: inline-block;
      flex: 0 0 16px;
      color: currentColor;
    }

    .btn-icon svg {
      width: 16px;
      height: 16px;
      display: block;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
      vector-effect: non-scaling-stroke;
    }

    .viewer {
      position: relative;
      border: 1px solid var(--border);
      border-radius: 0;
      background: #fff;
      overflow: hidden;
    }

    .viewer.progressing::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.45);
      pointer-events: none;
      z-index: 2;
    }

    .progress-bar {
      position: absolute;
      left: 0;
      top: 0;
      height: 3px;
      width: 0;
      background: linear-gradient(90deg, #22c55e 0%, #16a34a 100%);
      box-shadow: 0 1px 6px rgba(34, 197, 94, 0.35);
      transition: width .12s linear, opacity .12s ease;
      opacity: 0;
      z-index: 3;
    }

    .progress-bar.visible { opacity: 1; }

    .scroll-sync {
      display: grid;
      grid-template-columns: 56px minmax(0, 1fr);
      min-height: 76vh;
      max-height: 82vh;
    }

    .scroll-sync.wrap-enabled {
      grid-template-columns: minmax(0, 1fr);
    }

    .line-numbers {
      overflow: hidden;
      position: relative;
      border-right: 1px solid #f1f5f9;
      background: #fafafa;
      color: #94a3b8;
      font-family: var(--mono);
      font-size: 13px;
      line-height: var(--code-line-height);
      user-select: none;
      white-space: pre;
      text-align: right;
      padding: var(--code-padding-y) 8px var(--code-padding-y) 0;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .line-numbers-inner {
      transform: translateY(0);
      will-change: transform;
    }

    .line-numbers.tree { line-height: var(--code-line-height); }

    .editor,
    .tree-wrap {
      width: 100%;
      min-height: 76vh;
      max-height: 82vh;
      border: 0;
      border-radius: 0;
      background: #fff;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      outline: none;
      overflow: auto;
      scrollbar-width: thin;
    }

    .editor {
      resize: vertical;
      padding: var(--code-padding-y) 14px;
      line-height: var(--code-line-height);
      white-space: pre;
      word-break: normal;
    }

    .editor.processing-disabled {
      background: var(--disabled-editor-bg);
    }

    .tree-wrap {
      line-height: var(--code-line-height);
      padding: var(--code-padding-y) 0;
    }

    .tree-root { padding: 0 10px; }
    .placeholder-text { color: var(--muted); padding: 10px 6px; }

    .node-line {
      display: flex;
      align-items: flex-start;
      min-height: var(--code-line-height);
      border-radius: 8px;
      padding: 0 6px 0 2px;
      min-width: 0;
    }

    .node-content {
      display: block;
      flex: 1 1 auto;
      min-width: 0;
      white-space: pre;
      word-break: normal;
      overflow-wrap: normal;
    }

    .tree-wrap.wrap-enabled .node-content {
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    .node-line:hover { background: #fafafa; }

    .indent { display: inline-block; width: 18px; flex: 0 0 18px; }

    .toggle {
      appearance: none;
      border: none;
      background: transparent;
      color: var(--toggle);
      width: 18px;
      height: var(--code-line-height);
      padding: 0;
      margin: 0;
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex: 0 0 18px;
      transform: none;
    }

    .toggle:hover { background: #f3f4f6; transform: none; }
    .toggle.placeholder { cursor: default; visibility: hidden; }

    .caret {
      display: inline-block;
      width: 10px;
      height: 10px;
      transition: transform .12s ease;
    }

    .toggle[data-collapsed="true"] .caret { transform: rotate(-90deg); }

    .node-key { color: var(--key); font-weight: 600; }
    .node-colon, .node-comma, .node-bracket { color: #6b7280; }
    .node-value.string { color: var(--string); }
    .node-value.number { color: var(--number); }
    .node-value.boolean { color: var(--boolean); }
    .node-value.null { color: var(--null); }
    .collapsed-inline { color: var(--muted); margin-left: 0; }

    @media (max-width: 1180px) {
      .app-header {
        align-items: flex-start;
        flex-direction: column;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .editor, .tree-wrap {
        min-height: 46vh;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="app-header">
      <h1>JSON formatter</h1>
      <div class="app-actions">
        <button id="formatBtn" class="icon-btn" title="Форматировать" aria-label="Форматировать">
          <span class="btn-icon"><svg viewBox="0 0 24 24"><path d="M4 7h16"/><path d="M4 12h10"/><path d="M4 17h13"/></svg></span>
        </button>
        <button id="loadBtn" class="icon-btn" title="Загрузить JSON" aria-label="Загрузить JSON">
          <span class="btn-icon"><svg viewBox="0 0 24 24"><path d="M12 3v12"/><path d="m7 8 5-5 5 5"/><path d="M4 21h16"/></svg></span>
        </button>
        <button id="downloadBtn" class="icon-btn" title="Скачать JSON" aria-label="Скачать JSON" disabled>
          <span class="btn-icon"><svg viewBox="0 0 24 24"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M4 21h16"/></svg></span>
        </button>
        <button id="copyBtn" class="icon-btn" title="Копировать" aria-label="Копировать" disabled>
          <span class="btn-icon"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V6a2 2 0 0 1 2-2h9"/></svg></span>
        </button>
        <button id="wrapBtn" class="icon-btn" title="Перенос строк: выключен" aria-label="Перенос строк: выключен">
          <span class="btn-icon"><svg viewBox="0 0 24 24"><path d="M4 7h12"/><path d="M4 12h10a3 3 0 1 1 0 6h-1"/><path d="m15 16-2 2 2 2"/></svg></span>
        </button>
        <div class="toggle-group" aria-label="Panel visibility">
          <button id="toggleJsonBtn" class="icon-btn active" title="Скрыть JSON-панель" aria-label="Скрыть JSON-панель">
            <span class="btn-icon"><svg viewBox="0 0 24 24"><rect x="3" y="5" width="7" height="14" rx="1.5"/><path d="M13 7h8"/><path d="M13 12h8"/><path d="M13 17h8"/></svg></span>
          </button>
          <button id="toggleTreeBtn" class="icon-btn active" title="Скрыть tree-панель" aria-label="Скрыть tree-панель">
            <span class="btn-icon"><svg viewBox="0 0 24 24"><path d="M3 7h8"/><path d="M3 12h8"/><path d="M3 17h8"/><rect x="14" y="5" width="7" height="14" rx="1.5"/></svg></span>
          </button>
        </div>
        <button id="clearBtn" class="icon-btn" title="Очистить" aria-label="Очистить">
          <span class="btn-icon"><svg viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg></span>
        </button>
      </div>
    </div>

    <div class="layout" id="layout">
      <div class="panel" id="jsonPanel">
        <div class="panel-header">
          <div class="panel-title-row">
            <div class="panel-title">JSON</div>
            <div id="status" class="status">Готово</div>
          </div>
          <div class="panel-actions">
            <button id="pasteBtn" class="action-btn" type="button" title="Paste from clipboard" aria-label="Paste from clipboard">
              <span class="btn-icon"><svg viewBox="0 0 24 24"><path d="M9 4h6"/><path d="M9 2h6v4H9z"/><path d="M7 6H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-1"/></svg></span>
              <span>Paste</span>
            </button>
          </div>
        </div>
        <div class="panel-body">
          <input id="fileInput" type="file" accept=".json,application/json,.txt" hidden />
          <div id="editorViewer" class="viewer">
            <div id="editorProgress" class="progress-bar"></div>
            <div class="scroll-sync">
              <div id="editorLineNumbers" class="line-numbers"><div class="line-numbers-inner"></div></div>
              <textarea id="editor" class="editor" spellcheck="false"></textarea>
            </div>
          </div>
        </div>
      </div>

      <div class="panel" id="treePanel">
        <div class="panel-header">
          <div class="panel-title-row">
            <div class="panel-title">Tree</div>
            <div id="meta" class="status"></div>
          </div>
          <div class="panel-actions">
            <button id="expandBtn" class="icon-btn" title="Развернуть всё" aria-label="Развернуть всё" disabled>
              <span class="btn-icon"><svg viewBox="0 0 24 24"><path d="M8 10l4 4 4-4"/><path d="M5 5h14"/><path d="M5 19h14"/></svg></span>
            </button>
            <button id="collapseBtn" class="icon-btn" title="Свернуть всё" aria-label="Свернуть всё" disabled>
              <span class="btn-icon"><svg viewBox="0 0 24 24"><path d="M8 14l4-4 4 4"/><path d="M5 5h14"/><path d="M5 19h14"/></svg></span>
            </button>
          </div>
        </div>
        <div class="panel-body">
          <div id="treeViewer" class="viewer">
            <div id="treeProgress" class="progress-bar"></div>
            <div class="scroll-sync">
              <div id="treeLineNumbers" class="line-numbers tree"><div class="line-numbers-inner"></div></div>
              <div id="treeWrap" class="tree-wrap">
                <div id="treeRoot" class="tree-root"><div class="placeholder-text">Пусто</div></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'json_formatter_state_v16';
    const SAVE_DEBOUNCE_MS = 250;
    const LARGE_TEXT_THRESHOLD = 1_500_000;
    const TREE_AUTO_HIDE_LINE_THRESHOLD = 10_000;
    const MASSIVE_NODE_THRESHOLD = 2000;
    const FORMAT_WORKER_SCRIPT = `
      self.onmessage = event => {
        const { text, includeParsed } = event.data || {};
        const isPrimitive = value => value === null || ['string', 'number', 'boolean'].includes(typeof value);
        const formatPrimitive = value => {
          if (typeof value === 'string') return JSON.stringify(value);
          if (value === null) return 'null';
          return String(value);
        };
        const isNumberArray = arr => Array.isArray(arr) && arr.every(v => typeof v === 'number' && Number.isFinite(v));
        const repeatIndent = (level, indent = '  ') => indent.repeat(level);
        const formatCustom = (value, level = 0) => {
          const current = repeatIndent(level);
          const next = repeatIndent(level + 1);
          if (value === null || typeof value !== 'object') return formatPrimitive(value);
          if (Array.isArray(value)) {
            if (value.length === 0) return '[]';
            if (isNumberArray(value)) return '[ ' + value.map(v => formatPrimitive(v)).join(', ') + ' ]';
            const allPrimitives = value.every(v => isPrimitive(v));
            if (allPrimitives) {
              const inline = '[ ' + value.map(v => formatPrimitive(v)).join(', ') + ' ]';
              if (inline.length <= 120) return inline;
            }
            const items = value.map(item => \`\${next}\${formatCustom(item, level + 1)}\`);
            return '[\\n' + items.join(',\\n') + '\\n' + current + ']';
          }
          const entries = Object.entries(value);
          if (entries.length === 0) return '{}';
          const lines = entries.map(([key, val]) => \`\${next}\${JSON.stringify(key)}: \${formatCustom(val, level + 1)}\`);
          return '{\\n' + lines.join(',\\n') + '\\n' + current + '}';
        };
        try {
          const parsed = JSON.parse(text);
          const formatted = formatCustom(parsed);
          self.postMessage({ ok: true, formatted, parsed: includeParsed ? parsed : null });
        } catch (error) {
          self.postMessage({ ok: false, error: error.message || String(error) });
        }
      };
    `;

    const state = {
      parsed: null,
      fileName: '',
      fileSize: 0,
      collapsed: new Set(),
      settings: {
        wrapEnabled: false,
        showJsonPanel: true,
        showTreePanel: true
      },
      processing: {
        token: 0,
        active: false
      },
      worker: null,
      workerUrl: null,
      syncScroll: {
        target: '',
        until: 0
      },
      saveTimer: null
    };

    const els = {
      layout: document.getElementById('layout'),
      jsonPanel: document.getElementById('jsonPanel'),
      treePanel: document.getElementById('treePanel'),
      fileInput: document.getElementById('fileInput'),
      editorViewer: document.getElementById('editorViewer'),
      editorProgress: document.getElementById('editorProgress'),
      editorLineNumbers: document.getElementById('editorLineNumbers'),
      editor: document.getElementById('editor'),
      status: document.getElementById('status'),
      meta: document.getElementById('meta'),
      treeViewer: document.getElementById('treeViewer'),
      treeProgress: document.getElementById('treeProgress'),
      treeLineNumbers: document.getElementById('treeLineNumbers'),
      treeWrap: document.getElementById('treeWrap'),
      treeRoot: document.getElementById('treeRoot'),
      formatBtn: document.getElementById('formatBtn'),
      pasteBtn: document.getElementById('pasteBtn'),
      loadBtn: document.getElementById('loadBtn'),
      downloadBtn: document.getElementById('downloadBtn'),
      copyBtn: document.getElementById('copyBtn'),
      wrapBtn: document.getElementById('wrapBtn'),
      toggleJsonBtn: document.getElementById('toggleJsonBtn'),
      toggleTreeBtn: document.getElementById('toggleTreeBtn'),
      clearBtn: document.getElementById('clearBtn'),
      expandBtn: document.getElementById('expandBtn'),
      collapseBtn: document.getElementById('collapseBtn'),
    };

    function setStatus(text, type = '') {
      els.status.textContent = text;
      els.status.className = 'status' + (type ? ' ' + type : '');
    }

    function formatBytes(bytes) {
      if (!bytes) return '';
      const units = ['B', 'KB', 'MB', 'GB'];
      let value = bytes;
      let i = 0;
      while (value >= 1024 && i < units.length - 1) {
        value /= 1024;
        i++;
      }
      return `${value.toFixed(value >= 10 || i === 0 ? 0 : 1)} ${units[i]}`;
    }

    function updateMeta() {
      const parts = [];
      if (state.fileName) parts.push(state.fileName);
      if (state.fileSize) parts.push(formatBytes(state.fileSize));
      if (els.editor.value.length) parts.push(`${els.editor.value.length.toLocaleString('ru-RU')} chars`);
      els.meta.textContent = parts.join(' • ');
    }

    function getLineCount(text) {
      if (!text) return 0;
      return String(text).split('\n').length;
    }

    function shouldAutoHideTreeForText(text) {
      return getLineCount(text) > TREE_AUTO_HIDE_LINE_THRESHOLD;
    }

    function updateButtons(enabled) {
      els.downloadBtn.disabled = !enabled;
      els.copyBtn.disabled = !enabled;
      els.expandBtn.disabled = !enabled || !state.settings.showTreePanel;
      els.collapseBtn.disabled = !enabled || !state.settings.showTreePanel;
    }

    function updateWrap() {
      els.wrapBtn.classList.toggle('active', state.settings.wrapEnabled);
      const editorSync = els.editorViewer.querySelector('.scroll-sync');
      const treeSync = els.treeViewer.querySelector('.scroll-sync');
      if (state.settings.wrapEnabled) {
        els.editor.style.whiteSpace = 'pre-wrap';
        els.editor.style.wordBreak = 'break-word';
        els.treeWrap.classList.add('wrap-enabled');
        els.editorLineNumbers.style.display = 'none';
        els.treeLineNumbers.style.display = 'none';
        if (editorSync) editorSync.classList.add('wrap-enabled');
        if (treeSync) treeSync.classList.add('wrap-enabled');
        els.wrapBtn.title = 'Перенос строк: включён';
        els.wrapBtn.setAttribute('aria-label', 'Перенос строк: включён');
      } else {
        els.editor.style.whiteSpace = 'pre';
        els.editor.style.wordBreak = 'normal';
        els.treeWrap.classList.remove('wrap-enabled');
        els.editorLineNumbers.style.display = '';
        els.treeLineNumbers.style.display = '';
        if (editorSync) editorSync.classList.remove('wrap-enabled');
        if (treeSync) treeSync.classList.remove('wrap-enabled');
        els.wrapBtn.title = 'Перенос строк: выключен';
        els.wrapBtn.setAttribute('aria-label', 'Перенос строк: выключен');
      }
    }

    function updateJsonPanelVisibility() {
      els.layout.classList.toggle('json-hidden', !state.settings.showJsonPanel);
      els.toggleJsonBtn.classList.toggle('active', state.settings.showJsonPanel);
      if (state.settings.showJsonPanel) {
        els.toggleJsonBtn.title = 'Скрыть JSON-панель';
        els.toggleJsonBtn.setAttribute('aria-label', 'Скрыть JSON-панель');
      } else {
        els.toggleJsonBtn.title = 'Показать JSON-панель';
        els.toggleJsonBtn.setAttribute('aria-label', 'Показать JSON-панель');
      }
    }

    function updateTreePanelVisibility() {
      els.layout.classList.toggle('tree-hidden', !state.settings.showTreePanel);
      els.toggleTreeBtn.classList.toggle('active', state.settings.showTreePanel);
      if (state.settings.showTreePanel) {
        els.toggleTreeBtn.title = 'Скрыть tree-панель';
        els.toggleTreeBtn.setAttribute('aria-label', 'Скрыть tree-панель');
        if (state.parsed !== null) {
          renderTreeRoot();
        } else if (els.editor.value.trim()) {
          void parseAndFormat({ source: 'toggle-tree' });
        }
      } else {
        els.toggleTreeBtn.title = 'Показать tree-панель';
        els.toggleTreeBtn.setAttribute('aria-label', 'Показать tree-панель');
        updateButtons(state.parsed !== null);
      }
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function updateLineNumbers(target, text, className = '') {
      const lineCount = Math.max(1, String(text || '').split('\n').length);
      updateLineNumbersByCount(target, lineCount, className);
    }

    function updateLineNumbersByCount(target, lineCount, className = '') {
      const normalizedCount = Math.max(1, Number(lineCount) || 1);
      const lines = new Array(normalizedCount);
      for (let i = 0; i < normalizedCount; i++) lines[i] = String(i + 1);
      target.className = 'line-numbers' + (className ? ' ' + className : '');
      const inner = target.querySelector('.line-numbers-inner');
      if (inner) inner.textContent = lines.join('\n');
    }

    function syncLineNumberScroll(lineNumbersEl, sourceEl) {
      const inner = lineNumbersEl.querySelector('.line-numbers-inner');
      if (!inner) return;
      inner.style.transform = `translateY(${-sourceEl.scrollTop}px)`;
    }

    function setProgress(viewerEl, progressEl, ratio, visible) {
      viewerEl.classList.toggle('progressing', !!visible);
      progressEl.classList.toggle('visible', !!visible);
      progressEl.style.width = `${Math.max(0, Math.min(100, ratio * 100))}%`;
    }

    function beginProcessing(statusText = 'Обработка...') {
      state.processing.token += 1;
      state.processing.active = true;
      els.formatBtn.disabled = true;
      els.expandBtn.disabled = true;
      els.collapseBtn.disabled = true;
      els.editor.classList.add('processing-disabled');
      setStatus(statusText, '');
      setProgress(els.editorViewer, els.editorProgress, 0.08, true);
      setProgress(els.treeViewer, els.treeProgress, 0.08, state.settings.showTreePanel);
      return state.processing.token;
    }

    function updateProcessing(token, ratio, statusText = 'Обработка...') {
      if (token !== state.processing.token || !state.processing.active) return false;
      setStatus(statusText, '');
      setProgress(els.editorViewer, els.editorProgress, ratio, true);
      setProgress(els.treeViewer, els.treeProgress, ratio, state.settings.showTreePanel);
      return true;
    }

    function finishProcessing(token) {
      if (token !== state.processing.token) return;
      state.processing.active = false;
      els.formatBtn.disabled = false;
      els.editor.classList.remove('processing-disabled');
      setProgress(els.editorViewer, els.editorProgress, 1, false);
      setProgress(els.treeViewer, els.treeProgress, 1, false);
    }

    function getFormatWorker() {
      if (state.worker) return state.worker;
      if (!state.workerUrl) state.workerUrl = URL.createObjectURL(new Blob([FORMAT_WORKER_SCRIPT], { type: 'text/javascript' }));
      state.worker = new Worker(state.workerUrl);
      return state.worker;
    }

    function runFormatWorker(text, includeParsed) {
      return new Promise((resolve, reject) => {
        const worker = getFormatWorker();
        const handleMessage = event => {
          cleanup();
          const payload = event.data || {};
          if (payload.ok) resolve(payload);
          else reject(new Error(payload.error || 'Unknown worker error'));
        };
        const handleError = error => {
          cleanup();
          reject(error instanceof Error ? error : new Error(String(error?.message || error)));
        };
        const cleanup = () => {
          worker.removeEventListener('message', handleMessage);
          worker.removeEventListener('error', handleError);
        };
        worker.addEventListener('message', handleMessage);
        worker.addEventListener('error', handleError);
        worker.postMessage({ text, includeParsed });
      });
    }

    function isPrimitive(value) {
      return value === null || ['string', 'number', 'boolean'].includes(typeof value);
    }

    function formatPrimitive(value) {
      if (typeof value === 'string') return JSON.stringify(value);
      if (value === null) return 'null';
      return String(value);
    }

    function isNumberArray(arr) {
      return Array.isArray(arr) && arr.every(v => typeof v === 'number' && Number.isFinite(v));
    }

    function repeatIndent(level, indent = '  ') {
      return indent.repeat(level);
    }

    function formatCustom(value, level = 0) {
      const current = repeatIndent(level);
      const next = repeatIndent(level + 1);

      if (value === null || typeof value !== 'object') return formatPrimitive(value);

      if (Array.isArray(value)) {
        if (value.length === 0) return '[]';

        if (isNumberArray(value)) {
          return '[ ' + value.map(v => formatPrimitive(v)).join(', ') + ' ]';
        }

        const allPrimitives = value.every(v => isPrimitive(v));
        if (allPrimitives) {
          const inline = '[ ' + value.map(v => formatPrimitive(v)).join(', ') + ' ]';
          if (inline.length <= 120) return inline;
        }

        const items = value.map(item => `${next}${formatCustom(item, level + 1)}`);
        return '[\n' + items.join(',\n') + '\n' + current + ']';
      }

      const entries = Object.entries(value);
      if (entries.length === 0) return '{}';

      const lines = entries.map(([key, val]) => `${next}${JSON.stringify(key)}: ${formatCustom(val, level + 1)}`);
      return '{\n' + lines.join(',\n') + '\n' + current + '}';
    }

    function createPrimitiveValueNode(value) {
      const type = value === null ? 'null' : typeof value;
      const shown = type === 'string' ? JSON.stringify(value) : String(value);
      const node = document.createElement('span');
      node.className = `node-value ${type}`;
      node.textContent = shown;
      return node;
    }

    function appendInlineArray(content, arr) {
      const open = document.createElement('span');
      open.className = 'node-bracket';
      open.textContent = '[';
      content.appendChild(open);

      if (arr.length > 0) {
        content.appendChild(document.createTextNode(' '));
        arr.forEach((item, index) => {
          content.appendChild(createPrimitiveValueNode(item));
          if (index < arr.length - 1) {
            const comma = document.createElement('span');
            comma.className = 'node-comma';
            comma.textContent = ',';
            content.appendChild(comma);
            content.appendChild(document.createTextNode(' '));
          }
        });
        content.appendChild(document.createTextNode(' '));
      }

      const close = document.createElement('span');
      close.className = 'node-bracket';
      close.textContent = ']';
      content.appendChild(close);
    }

    function isInlineTreeArray(arr) {
      if (!Array.isArray(arr) || arr.length === 0) return false;
      if (isNumberArray(arr)) return true;
      const allPrimitives = arr.every(v => isPrimitive(v));
      if (!allPrimitives) return false;
      const inline = '[ ' + arr.map(v => formatPrimitive(v)).join(', ') + ' ]';
      return inline.length <= 120;
    }

    function shortSummary(value) {
      if (Array.isArray(value)) return `#${value.length}`;
      if (value && typeof value === 'object') return `#${Object.keys(value).length}`;
      return '';
    }

    function getValueByPath(path) {
      if (path === 'root') return state.parsed;
      const parts = path.slice(5).split('.').filter(Boolean);
      let current = state.parsed;
      for (const part of parts) {
        if (current == null) return undefined;
        current = current[Array.isArray(current) ? Number(part) : part];
      }
      return current;
    }

    function createIndent(line, level) {
      for (let i = 0; i < level; i++) {
        const indent = document.createElement('span');
        indent.className = 'indent';
        line.appendChild(indent);
      }
    }

    function createTreeToggle(path, collapsed, isContainer) {
      const toggle = document.createElement('button');
      toggle.className = 'toggle' + (isContainer ? '' : ' placeholder');
      toggle.type = 'button';
      toggle.dataset.path = path;
      toggle.dataset.collapsed = collapsed ? 'true' : 'false';
      toggle.innerHTML = `<svg class="caret" viewBox="0 0 12 12" aria-hidden="true"><path d="M2 4l4 4 4-4" stroke="currentColor" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
      if (!isContainer) {
        toggle.tabIndex = -1;
        toggle.setAttribute('aria-hidden', 'true');
        toggle.disabled = true;
      } else {
        toggle.title = collapsed ? 'Expand' : 'Collapse';
        toggle.setAttribute('aria-label', collapsed ? 'Expand node' : 'Collapse node');
      }
      return toggle;
    }

    function appendKeyPrefix(content, keyName) {
      if (keyName === null) return;

      const key = document.createElement('span');
      key.className = 'node-key';
      key.textContent = JSON.stringify(String(keyName));
      content.appendChild(key);

      const colon = document.createElement('span');
      colon.className = 'node-colon';
      colon.textContent = ': ';
      content.appendChild(colon);
    }

    function appendTrailingComma(content, trailingComma) {
      if (!trailingComma) return;
      const comma = document.createElement('span');
      comma.className = 'node-comma';
      comma.textContent = ',';
      content.appendChild(comma);
    }

    function createTreeLine(level, path, keyName, isContainer, collapsed) {
      const line = document.createElement('div');
      line.className = 'node-line';
      line.dataset.path = path;
      line.dataset.level = String(level);
      createIndent(line, level);
      line.appendChild(createTreeToggle(path, collapsed, isContainer));

      const content = document.createElement('span');
      content.className = 'node-content';
      appendKeyPrefix(content, keyName);
      line.appendChild(content);
      return { line, content };
    }

    function appendContainerOpen(content, value, collapsed, trailingComma) {
      const open = document.createElement('span');
      open.className = 'node-bracket';
      open.textContent = Array.isArray(value) ? '[' : '{';
      content.appendChild(open);

      if (!collapsed) return;

      const collapsedInline = document.createElement('span');
      collapsedInline.className = 'collapsed-inline';
      collapsedInline.textContent = shortSummary(value);
      content.appendChild(collapsedInline);

      const close = document.createElement('span');
      close.className = 'node-bracket';
      close.textContent = Array.isArray(value) ? ']' : '}';
      content.appendChild(close);

      appendTrailingComma(content, trailingComma);
    }

    function createClosingLine(level, value, trailingComma) {
      const line = document.createElement('div');
      line.className = 'node-line';
      line.dataset.level = String(level);
      createIndent(line, level);

      const spacer = document.createElement('span');
      spacer.className = 'toggle placeholder';
      spacer.setAttribute('aria-hidden', 'true');
      line.appendChild(spacer);

      const content = document.createElement('span');
      content.className = 'node-content';

      const close = document.createElement('span');
      close.className = 'node-bracket';
      close.textContent = Array.isArray(value) ? ']' : '}';
      content.appendChild(close);
      appendTrailingComma(content, trailingComma);

      line.appendChild(content);
      return line;
    }

    function appendValueLine(lines, path, keyName, level, value, trailingComma) {
      const isContainer = value !== null && typeof value === 'object';
      const collapsed = isContainer && state.collapsed.has(path);

      const { line, content } = createTreeLine(level, path, keyName, isContainer, collapsed);

      if (!isContainer) {
        content.appendChild(createPrimitiveValueNode(value));
        appendTrailingComma(content, trailingComma);
        lines.push(line);
        return;
      }

      if (Array.isArray(value) && value.length === 0) {
        const empty = document.createElement('span');
        empty.className = 'node-bracket';
        empty.textContent = '[]';
        content.appendChild(empty);
        appendTrailingComma(content, trailingComma);
        lines.push(line);
        return;
      }

      if (Array.isArray(value) && isInlineTreeArray(value)) {
        appendInlineArray(content, value);
        appendTrailingComma(content, trailingComma);
        lines.push(line);
        return;
      }

      appendContainerOpen(content, value, collapsed, trailingComma);
      lines.push(line);
      if (collapsed) return;

      const entries = Array.isArray(value) ? value.map((item, index) => [index, item]) : Object.entries(value);
      entries.forEach(([childKey, childValue], index) => {
        const childPath = `${path}.${childKey}`;
        const shownKey = Array.isArray(value) ? null : childKey;
        appendValueLine(lines, childPath, shownKey, level + 1, childValue, index < entries.length - 1);
      });

      lines.push(createClosingLine(level, value, trailingComma));
    }

    function toggleNode(path) {
      const value = getValueByPath(path);
      if (!value || typeof value !== 'object') return;
      if (state.collapsed.has(path)) state.collapsed.delete(path);
      else state.collapsed.add(path);
      renderTreeRoot();
      scheduleSave();
    }

    function renderTreeRoot() {
      updateLineNumbersByCount(els.treeLineNumbers, 1, 'tree');
      if (!state.settings.showTreePanel) {
        els.treeRoot.innerHTML = '<div class="placeholder-text">Tree hidden</div>';
        updateButtons(state.parsed !== null);
        updateMeta();
        return;
      }
      els.treeRoot.innerHTML = '';
      if (state.parsed === null) {
        els.treeRoot.innerHTML = '<div class="placeholder-text">Пусто</div>';
        updateButtons(false);
        updateMeta();
        updateLineNumbersByCount(els.treeLineNumbers, 1, 'tree');
        return;
      }

      const lines = [];
      appendValueLine(lines, 'root', null, 0, state.parsed, false);
      const fragment = document.createDocumentFragment();
      for (const line of lines) fragment.appendChild(line);
      els.treeRoot.appendChild(fragment);
      updateButtons(true);
      updateMeta();
      updateLineNumbersByCount(els.treeLineNumbers, lines.length, 'tree');
      syncLineNumberScroll(els.treeLineNumbers, els.treeWrap);
    }

    function collapseAll() {
      state.collapsed.clear();
      if (state.parsed && typeof state.parsed === 'object') state.collapsed.add('root');
      renderTreeRoot();
      scheduleSave();
    }

    function expandAll() {
      if (!state.parsed || typeof state.parsed !== 'object') return;
      state.collapsed.clear();
      renderTreeRoot();
      scheduleSave();
      return;

      if (els.editor.value.length > LARGE_TEXT_THRESHOLD) {
        setStatus('JSON отформатирован. Полное раскрытие ограничено для больших данных.', 'ok');
        scheduleSave();
        return;
      }

      const root = els.treeRoot.querySelector('.tree-node[data-path="root"]');
      const queue = root ? [root] : [];

      function processBatch() {
        let processed = 0;
        while (queue.length && processed < 50) {
          const node = queue.shift();
          if (!node || node.dataset.isContainer !== 'true') continue;
          node.dataset.collapsed = 'false';
          ensureChildrenBuilt(node);
          applyCollapsedState(node);

          const value = getValueByPath(node.dataset.path);
          const total = Array.isArray(value) ? value.length : Object.keys(value || {}).length;
          if (total <= MASSIVE_NODE_THRESHOLD) {
            const children = node.querySelector(':scope > .children');
            if (children) {
              for (const child of children.children) {
                if (child.dataset.isContainer === 'true') queue.push(child);
              }
            }
          }
          processed++;
        }

        if (queue.length) requestAnimationFrame(processBatch);
        else scheduleSave();
      }

      requestAnimationFrame(processBatch);
    }

    function parseAndFormat() {
      const text = els.editor.value.trim();
      if (!text) {
        state.parsed = null;
        state.collapsed.clear();
        renderTreeRoot();
        setStatus('Пусто', '');
        scheduleSave();
        return;
      }

      try {
        const parsed = JSON.parse(text);
        const formatted = formatCustom(parsed);
        state.parsed = parsed;
        els.editor.value = formatted;
        state.collapsed.clear();

        if (typeof parsed === 'object' && parsed !== null && formatted.length > LARGE_TEXT_THRESHOLD) {
          state.collapsed.add('root');
        }

        renderTreeRoot();
        setStatus(
          formatted.length > LARGE_TEXT_THRESHOLD
            ? 'JSON отформатирован. Дерево стартует свёрнутым для больших данных.'
            : 'JSON отформатирован.',
          'ok'
        );
        scheduleSave();
      } catch (err) {
        state.parsed = null;
        renderTreeRoot();
        setStatus('Ошибка JSON: ' + err.message, 'error');
      }
    }

    function nextFrame() {
      return new Promise(resolve => requestAnimationFrame(() => resolve()));
    }

    async function parseAndFormat(options = {}) {
      const { source = 'manual' } = options;
      const text = els.editor.value.trim();
      if (!text) {
        state.parsed = null;
        state.collapsed.clear();
        renderTreeRoot();
        updateLineNumbers(els.editorLineNumbers, els.editor.value);
        syncLineNumberScroll(els.editorLineNumbers, els.editor);
        setStatus('Пусто', '');
        scheduleSave();
        return;
      }

      const shouldAutoHideTree = shouldAutoHideTreeForText(text);
      if (shouldAutoHideTree && state.settings.showTreePanel) {
        state.settings.showTreePanel = false;
        updateTreePanelVisibility();
      }

      const token = beginProcessing(source === 'paste' ? 'Вставка и форматирование...' : 'Форматирование JSON...');
      try {
        await nextFrame();
        if (!updateProcessing(token, 0.18, 'Разбор и форматирование JSON...')) return;
        const workerResult = await runFormatWorker(text, state.settings.showTreePanel);
        if (!updateProcessing(token, 0.62, 'Применение результата...')) return;
        const formatted = workerResult.formatted;
        els.editor.value = formatted;
        updateLineNumbers(els.editorLineNumbers, formatted);
        syncLineNumberScroll(els.editorLineNumbers, els.editor);
        state.collapsed.clear();
        state.parsed = state.settings.showTreePanel ? workerResult.parsed : null;

        if (state.settings.showTreePanel && typeof state.parsed === 'object' && state.parsed !== null && formatted.length > LARGE_TEXT_THRESHOLD) {
          state.collapsed.add('root');
        }

        if (state.settings.showTreePanel) {
          if (!updateProcessing(token, 0.82, 'Построение tree view...')) return;
          await nextFrame();
          renderTreeRoot();
        } else {
          els.treeRoot.innerHTML = '<div class="placeholder-text">Tree hidden</div>';
          updateButtons(true);
          updateMeta();
        }

        setStatus(
          formatted.length > LARGE_TEXT_THRESHOLD
            ? 'JSON отформатирован. Дерево стартует свёрнутым для больших данных.'
            : 'JSON отформатирован.',
          'ok'
        );
        if (shouldAutoHideTree) {
          setStatus(`JSON отформатирован. Tree view автоматически отключён: ${getLineCount(formatted).toLocaleString('ru-RU')} lines.`, 'ok');
        }
        finishProcessing(token);
        scheduleSave();
      } catch (err) {
        state.parsed = null;
        renderTreeRoot();
        updateLineNumbers(els.editorLineNumbers, els.editor.value);
        syncLineNumberScroll(els.editorLineNumbers, els.editor);
        finishProcessing(token);
        setStatus('Ошибка JSON: ' + err.message, 'error');
      }
    }

    function saveStateNow() {
      const payload = {
        text: els.editor.value,
        fileName: state.fileName,
        fileSize: state.fileSize,
        collapsed: Array.from(state.collapsed).slice(0, 5000),
        settings: state.settings
      };
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
      } catch {}
    }

    function scheduleSave() {
      clearTimeout(state.saveTimer);
      state.saveTimer = setTimeout(saveStateNow, SAVE_DEBOUNCE_MS);
    }

    function restoreState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) {
          updateMeta();
          return;
        }

        const saved = JSON.parse(raw);
        if (typeof saved.text === 'string') els.editor.value = saved.text;
        if (typeof saved.fileName === 'string') state.fileName = saved.fileName;
        if (typeof saved.fileSize === 'number') state.fileSize = saved.fileSize;
        if (Array.isArray(saved.collapsed)) state.collapsed = new Set(saved.collapsed);

        if (saved.settings && typeof saved.settings === 'object') {
          if (typeof saved.settings.wrapEnabled === 'boolean') state.settings.wrapEnabled = saved.settings.wrapEnabled;
          if (typeof saved.settings.showJsonPanel === 'boolean') state.settings.showJsonPanel = saved.settings.showJsonPanel;
          if (typeof saved.settings.showTreePanel === 'boolean') state.settings.showTreePanel = saved.settings.showTreePanel;
        }

        if (shouldAutoHideTreeForText(els.editor.value)) {
          state.settings.showTreePanel = false;
        }

        updateWrap();
        updateJsonPanelVisibility();
        updateTreePanelVisibility();
        updateMeta();

        if (els.editor.value.trim()) {
          try {
            state.parsed = JSON.parse(els.editor.value);
            renderTreeRoot();
            setStatus('Восстановлено из localStorage', 'ok');
          } catch {
            setStatus('Восстановлен текст, но JSON невалиден', 'error');
          }
        }
      } catch {
        updateMeta();
      }
    }

    async function copyOutput() {
      const text = els.editor.value;
      if (!text) return;
      try {
        await navigator.clipboard.writeText(text);
        setStatus('Скопировано', 'ok');
      } catch {
        setStatus('Не удалось скопировать', 'error');
      }
    }

    function downloadJson() {
      const text = els.editor.value;
      if (!text) return;

      const blob = new Blob([text], { type: 'application/json;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = state.fileName ? state.fileName.replace(/\.[^.]+$/, '') + '.formatted.json' : 'formatted.json';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function loadFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        els.editor.value = typeof reader.result === 'string' ? reader.result : '';
        state.fileName = file.name;
        state.fileSize = file.size;
        updateLineNumbers(els.editorLineNumbers, els.editor.value);
        syncLineNumberScroll(els.editorLineNumbers, els.editor);
        updateMeta();
        setStatus(`Загружен ${file.name}`, '');
        scheduleSave();
      };
      reader.readAsText(file);
    }

    async function pasteFromClipboard() {
      try {
        const text = await navigator.clipboard.readText();
        if (!text) return;
        els.editor.value = text;
        state.fileName = '';
        state.fileSize = new Blob([text]).size;
        updateMeta();
        updateLineNumbers(els.editorLineNumbers, text);
        syncLineNumberScroll(els.editorLineNumbers, els.editor);
        await parseAndFormat({ source: 'paste' });
      } catch {
        setStatus('Не удалось прочитать буфер обмена', 'error');
      }
    }

    function syncEditorScrollToTree() {
      const now = performance.now();
      if (state.syncScroll.target === 'editor' && now < state.syncScroll.until) return;
      const ratio = els.editor.scrollTop / Math.max(els.editor.scrollHeight - els.editor.clientHeight, 1);
      const targetScrollTop = ratio * Math.max(els.treeWrap.scrollHeight - els.treeWrap.clientHeight, 0);
      if (Math.abs(els.treeWrap.scrollTop - targetScrollTop) > 1) {
        state.syncScroll.target = 'tree';
        state.syncScroll.until = now + 140;
        els.treeWrap.scrollTop = targetScrollTop;
      }
      syncLineNumberScroll(els.editorLineNumbers, els.editor);
      syncLineNumberScroll(els.treeLineNumbers, els.treeWrap);
    }

    function syncTreeScrollToEditor() {
      const now = performance.now();
      if (state.syncScroll.target === 'tree' && now < state.syncScroll.until) return;
      const ratio = els.treeWrap.scrollTop / Math.max(els.treeWrap.scrollHeight - els.treeWrap.clientHeight, 1);
      const targetScrollTop = ratio * Math.max(els.editor.scrollHeight - els.editor.clientHeight, 0);
      if (Math.abs(els.editor.scrollTop - targetScrollTop) > 1) {
        state.syncScroll.target = 'editor';
        state.syncScroll.until = now + 140;
        els.editor.scrollTop = targetScrollTop;
      }
      syncLineNumberScroll(els.treeLineNumbers, els.treeWrap);
      syncLineNumberScroll(els.editorLineNumbers, els.editor);
    }

    function clearAll() {
      els.editor.value = '';
      state.parsed = null;
      state.fileName = '';
      state.fileSize = 0;
      state.collapsed.clear();
      renderTreeRoot();
      updateLineNumbers(els.editorLineNumbers, '');
      syncLineNumberScroll(els.editorLineNumbers, els.editor);
      updateMeta();
      setStatus('Пусто', '');
      scheduleSave();
    }

    els.formatBtn.addEventListener('click', () => { void parseAndFormat(); });
    els.pasteBtn.addEventListener('click', () => { void pasteFromClipboard(); });
    els.loadBtn.addEventListener('click', () => els.fileInput.click());
    els.fileInput.addEventListener('change', e => loadFile(e.target.files?.[0]));
    els.downloadBtn.addEventListener('click', downloadJson);
    els.copyBtn.addEventListener('click', copyOutput);
    els.wrapBtn.addEventListener('click', () => {
      state.settings.wrapEnabled = !state.settings.wrapEnabled;
      updateWrap();
      scheduleSave();
    });
    els.toggleJsonBtn.addEventListener('click', () => {
      state.settings.showJsonPanel = !state.settings.showJsonPanel;
      updateJsonPanelVisibility();
      scheduleSave();
    });
    els.toggleTreeBtn.addEventListener('click', () => {
      state.settings.showTreePanel = !state.settings.showTreePanel;
      updateTreePanelVisibility();
      scheduleSave();
    });
    els.clearBtn.addEventListener('click', clearAll);
    els.expandBtn.addEventListener('click', expandAll);
    els.collapseBtn.addEventListener('click', collapseAll);

    els.editor.addEventListener('input', () => {
      updateMeta();
      updateLineNumbers(els.editorLineNumbers, els.editor.value);
      syncLineNumberScroll(els.editorLineNumbers, els.editor);
      scheduleSave();
    });

    els.editor.addEventListener('paste', () => {
      setTimeout(() => {
        updateMeta();
        updateLineNumbers(els.editorLineNumbers, els.editor.value);
        syncLineNumberScroll(els.editorLineNumbers, els.editor);
        void parseAndFormat({ source: 'paste' });
      }, 0);
    });

    els.editor.addEventListener('scroll', syncEditorScrollToTree, { passive: true });
    els.treeWrap.addEventListener('scroll', syncTreeScrollToEditor, { passive: true });
    els.treeRoot.addEventListener('click', e => {
      const toggle = e.target.closest('.toggle[data-path]');
      if (!toggle || toggle.disabled) return;
      toggleNode(toggle.dataset.path);
    });

    els.editor.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        void parseAndFormat();
      }
    });

    window.addEventListener('beforeunload', () => {
      saveStateNow();
      if (state.worker) state.worker.terminate();
      if (state.workerUrl) URL.revokeObjectURL(state.workerUrl);
    });

    updateWrap();
    updateJsonPanelVisibility();
    updateTreePanelVisibility();
    restoreState();
    updateLineNumbers(els.editorLineNumbers, els.editor.value);
    syncLineNumberScroll(els.editorLineNumbers, els.editor);
    if (!els.editor.value) updateMeta();
  </script>
</body>
</html>

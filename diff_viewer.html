<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Local Diff Viewer</title>
  <style>
    :root {
      --bg: #ffffff;
      --panel: #ffffff;
      --panel-soft: #fafafa;
      --text: #334155;
      --muted: #64748b;
      --border: #e7e5e4;
      --button: #ffffff;
      --button-hover: #f8fafc;
      --button-active: #f1f5f9;
      --add-bg: #ecfdf5;
      --del-bg: #ecfdf5;
      --change-bg: #fffbeb;
      --add-strong: #bbf7d0;
      --del-strong: #fde68a;
      --same-bg: #ffffff;
      --meta-bg: #eff6ff;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      --radius: 18px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      --sans: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { scrollbar-width: none; }
    body { margin: 0; color: var(--text); font-family: var(--sans); background: #ffffff; -ms-overflow-style: none; }
    body::-webkit-scrollbar { width: 0; height: 0; }
    .container { width: 100%; max-width: none; margin: 0; padding: 24px; }
    .app-header { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 16px; }
    h1 { margin: 0; font-size: 30px; line-height: 1.1; color: #1f2937; }
    .toolbar, .inputs { display: grid; gap: 16px; }
    .toolbar { display: flex; align-items: flex-end; justify-content: flex-end; gap: 10px; flex-wrap: wrap; margin-bottom: 0; }
    .control-group { display: grid; gap: 6px; align-content: start; }
    .control-label { font-size: 12px; color: var(--muted); font-weight: 700; letter-spacing: .02em; text-transform: uppercase; padding-left: 2px; }
    .inputs { grid-template-columns: 1fr 1fr; margin-bottom: 18px; }
    .ignore-panel { margin-bottom: 18px; display: none; }
    .ignore-panel.open { display: block; }
    .ignore-editor { min-height: 96px; max-height: 180px; margin-top: 0; }
    .panel { background: #ffffff; border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
    .panel-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 8px; background: #fafafa; }
    .panel-title { font-weight: 700; font-size: 14px; letter-spacing: .02em; color: #374151; }
    .panel-body { padding: 14px; }
    .dropzone { position: relative; border: 2px dashed #d6d3d1; border-radius: 14px; padding: 18px; min-height: 126px; background: #fafafa; transition: .15s ease; }
    .dropzone.drag { border-color: #93c5fd; background: #f8fafc; }
    .dropzone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .dropzone p { margin: 0 0 10px; color: var(--muted); }
    .filename { font-family: var(--mono); font-size: 13px; color: #475569; word-break: break-all; }
    .preview { width: 100%; min-height: 180px; max-height: 280px; resize: vertical; border: 1px solid var(--border); border-radius: 12px; background: #ffffff; color: var(--text); padding: 12px; font-family: var(--mono); font-size: 13px; line-height: 1.45; margin-top: 12px; }
    button, select, .segmented button { appearance: none; border: 1px solid var(--border); background: var(--button); color: #374151; border-radius: 12px; padding: 11px 14px; font-weight: 700; cursor: pointer; transition: .15s ease; min-height: 44px; }
    button:hover, select:hover, .segmented button:hover { background: var(--button-hover); }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .icon-btn { width: 44px; min-width: 44px; padding: 0; display: inline-flex; align-items: center; justify-content: center; overflow: hidden; }
    .icon-btn.with-badge { position: relative; overflow: visible; }
    .icon-badge { position: absolute; top: -5px; right: -5px; min-width: 18px; height: 18px; padding: 0 5px; border-radius: 999px; background: #22c55e; color: #f0fdf4; font-size: 10px; line-height: 18px; font-weight: 600; text-align: center; box-shadow: 0 0 0 2px #ffffff; display: none; }
    .icon-badge.inactive { background: #94a3b8; color: #f8fafc; }
    .inline-toggle { min-height: 36px; padding: 8px 12px; font-size: 12px; border-radius: 10px; }
    .icon-badge.visible { display: inline-block; }
    .icon-btn .btn-content,
    .segmented .icon-btn .btn-content { gap: 0; }
    .btn-text { display: none; }
    .icon-btn.primary-run { background: linear-gradient(180deg, #ecfdf5 0%, #d1fae5 100%); border-color: #a7f3d0; color: #047857; }
    .small { font-size: 12px; color: var(--muted); }
    .stats { display: flex; gap: 12px; flex-wrap: wrap; color: var(--muted); font-size: 13px; }
    .badge { border: 1px solid var(--border); padding: 4px 8px; border-radius: 999px; background: #fff; }
    .segmented { display: inline-flex; gap: 0; align-items: center; background: #fff; padding: 0; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .segmented .icon-btn { border: none; border-radius: 0; }
    .segmented .icon-btn + .icon-btn { border-left: 1px solid var(--border); }
    .segmented button.active { background: var(--button-active); border-color: #cbd5e1; color: #0f172a; }
    .btn-content { display: inline-flex; align-items: center; justify-content: center; gap: 8px; white-space: nowrap; }
    .btn-icon { width: 16px; height: 16px; display: inline-block; flex: 0 0 16px; color: currentColor; }
    .btn-icon svg { width: 16px; height: 16px; display: block; stroke: currentColor; fill: none; stroke-width: 1.9; stroke-linecap: round; stroke-linejoin: round; vector-effect: non-scaling-stroke; }
    .view-block { display: none; }
    .view-block.active { display: block; }
    .result-shell { position: relative; }
    .result-scroll { border: 1px solid var(--border); border-radius: 14px; background: #ffffff; }
    .overview-rail { position: fixed; top: 0; right: 0; bottom: 0; width: 24px; border-left: 1px solid rgba(148, 163, 184, 0.18); background: linear-gradient(180deg, #f8fafc 0%, #e2e8f0 100%); border-radius: 0; overflow: hidden; cursor: pointer; z-index: 20; }
    .overview-markers { position: absolute; inset: 0; }
    .overview-marker { position: absolute; left: 0; right: 0; min-height: 3px; opacity: .95; border-radius: 2px; }
    .overview-marker.added { background: #22c55e; }
    .overview-marker.changed { background: #f59e0b; }
    .overview-viewport { position: absolute; left: 0; right: 0; border-radius: 0; border-top: 1px solid rgba(15, 23, 42, 0.14); border-bottom: 1px solid rgba(15, 23, 42, 0.14); background: rgba(100, 116, 139, 0.28); box-shadow: inset 0 0 0 1px rgba(255,255,255,0.18); pointer-events: none; }
    .side-by-side { border-top: 1px solid var(--border); font-family: var(--mono); font-size: 13px; line-height: 1.5; }
    .side-head { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); }
    .col-head { position: sticky; top: 0; z-index: 1; background: #ffffff; border-bottom: 1px solid var(--border); padding: 10px 12px; font-size: 12px; color: var(--muted); letter-spacing: .02em; }
    .col-head + .col-head { border-left: 1px solid var(--border); }
    .diff-row { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); border-bottom: 1px solid #f1f5f9; align-items: stretch; }
    .half { min-width: 0; display: grid; grid-template-columns: 64px minmax(0, 1fr); align-items: stretch; }
    .half + .half { border-left: 1px solid var(--border); }
    .ln { user-select: none; color: #94a3b8; border-right: 1px solid #f1f5f9; padding: 6px 10px; text-align: right; white-space: nowrap; background: #fff; }
    .code { padding: 6px 10px; white-space: pre-wrap; word-break: break-word; overflow-wrap: anywhere; min-height: 31px; height: 100%; }
    .same .code { background: var(--same-bg); }
    .add .code { background: var(--add-bg); }
    .del .code { background: var(--del-bg); }
    .changed .code { background: var(--change-bg); }
    .placeholder .code { color: #cbd5e1; background: #fff; }
    .seg-add { background: var(--add-strong); border-radius: 3px; }
    .seg-del { background: var(--del-strong); border-radius: 3px; }
    .unified-box { border-top: 1px solid var(--border); background: #ffffff; font-family: var(--mono); font-size: 13px; line-height: 1.5; }
    .u-line { display: grid; grid-template-columns: 42px 1fr; border-bottom: 1px solid #f1f5f9; }
    .u-sign { text-align: center; padding: 6px 4px; color: #64748b; border-right: 1px solid #f1f5f9; background: #fff; user-select: none; }
    .u-code { padding: 6px 10px; white-space: pre-wrap; word-break: break-word; overflow-wrap: anywhere; }
    .u-add .u-code { background: var(--add-bg); }
    .u-del .u-code { background: var(--del-bg); }
    .u-change .u-code { background: var(--change-bg); }
    .u-meta .u-code { color: #2563eb; background: var(--meta-bg); }
    .empty { padding: 32px 18px; color: var(--muted); }
    .error-box { padding: 18px; border: 1px solid #fecaca; border-radius: 12px; background: #fff7f7; color: #991b1b; line-height: 1.45; }
    @media (max-width: 980px) {
      .app-header { flex-direction: column; align-items: flex-start; }
      .toolbar, .inputs { grid-template-columns: 1fr; }
      .toolbar { width: 100%; justify-content: flex-start; }
      .overview-rail { width: 24px; }
      .side-head, .diff-row { grid-template-columns: 1fr; }
      .col-head + .col-head, .half + .half { border-left: none; border-top: 1px solid var(--border); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="app-header">
      <h1>Diff viewer</h1>
      <div class="toolbar">
      <div class="control-group">
        <div class="control-label">Compare Mode</div>
        <select id="compareMode" aria-label="Comparison mode">
          <option value="text">Plain text</option>
          <option value="env">Env</option>
          <option value="log">Log</option>
          <option value="json">JSON</option>
          <option value="yaml">YAML</option>
        </select>
      </div>
      <button id="computeBtn" class="icon-btn primary-run" type="button" title="Generate diff" aria-label="Generate diff"><span class="btn-content"><span class="btn-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="3"/><path d="M10 8v8l6-4z"/></svg></span><span class="btn-text">Generate diff</span></span></button>
      <button id="downloadBtn" class="icon-btn" type="button" title="Download unified diff HTML" aria-label="Download unified diff HTML" disabled><span class="btn-content"><span class="btn-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M4 21h16"/></svg></span><span class="btn-text">Download unified diff HTML</span></span></button>
      <button id="toggleIgnoreBtn" class="icon-btn with-badge" type="button" title="Ignore patterns" aria-label="Ignore patterns" aria-expanded="false" aria-controls="ignorePanel"><span class="btn-content"><span class="btn-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 7h16"/><path d="M7 12h10"/><path d="M10 17h4"/></svg></span><span class="btn-text">Ignore patterns</span></span><span id="ignoreBadge" class="icon-badge" aria-hidden="true">0</span></button>
      <button id="swapBtn" class="icon-btn" type="button" title="Swap sides" aria-label="Swap sides"><span class="btn-content"><span class="btn-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 8h13"/><path d="m14 5 3 3-3 3"/><path d="M20 16H7"/><path d="m10 13-3 3 3 3"/></svg></span><span class="btn-text">Swap sides</span></span></button>
      <button id="clearBtn" class="icon-btn" type="button" title="Clear" aria-label="Clear"><span class="btn-content"><span class="btn-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg></span><span class="btn-text">Clear</span></span></button>
      <div class="segmented" aria-label="Diff view mode">
        <button id="viewSideBtn" class="icon-btn active" type="button" title="Side-by-side view" aria-label="Side-by-side view"><span class="btn-content"><span class="btn-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="3" y="5" width="8" height="14" rx="1.5"/><rect x="13" y="5" width="8" height="14" rx="1.5"/></svg></span><span class="btn-text">Side-by-side</span></span></button>
        <button id="viewUnifiedBtn" class="icon-btn" type="button" title="Unified view" aria-label="Unified view"><span class="btn-content"><span class="btn-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/><path d="M9 13h6"/><path d="M9 17h6"/><path d="M9 9h2"/></svg></span><span class="btn-text">Unified</span></span></button>
      </div>
    </div>
    </div>
    <div id="ignorePanel" class="panel ignore-panel">
      <div class="panel-header"><div class="panel-title">Ignore Patterns</div><div style="display:flex;align-items:center;gap:10px;"><button id="toggleIgnoreActiveBtn" class="inline-toggle" type="button">Patterns on</button><div class="small" id="ignoreMeta">No ignore patterns</div></div></div>
      <div class="panel-body">
        <textarea id="ignorePatterns" class="preview ignore-editor" spellcheck="false" placeholder="One regex per line. Example: \d+\.\d+\.\d+\.\d+"></textarea>
      </div>
    </div>
    <div class="inputs">
      <div class="panel">
        <div class="panel-header"><div class="panel-title">Left file</div><div class="small" id="leftMeta">not loaded</div></div>
        <div class="panel-body">
          <div class="dropzone" id="leftDrop"><input id="leftFile" type="file" /><p>Drop a file here or click to select</p><div class="filename" id="leftName">-</div></div>
          <textarea id="leftText" class="preview" spellcheck="false" placeholder="Left file content"></textarea>
        </div>
      </div>
      <div class="panel">
        <div class="panel-header"><div class="panel-title">Right file</div><div class="small" id="rightMeta">not loaded</div></div>
        <div class="panel-body">
          <div class="dropzone" id="rightDrop"><input id="rightFile" type="file" /><p>Drop a file here or click to select</p><div class="filename" id="rightName">-</div></div>
          <textarea id="rightText" class="preview" spellcheck="false" placeholder="Right file content"></textarea>
        </div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-header"><div class="panel-title">Result</div><div class="stats" id="stats"><span class="badge">unchanged: 0</span><span class="badge">added: 0</span><span class="badge">removed: 0</span><span class="badge">changed: 0</span></div></div>
      <div id="resultBody" class="panel-body"><div class="empty">Nothing to show yet. Load two files and click "Generate diff".</div></div>
    </div>
  </div>
  <script>
    const STORAGE_KEY = 'diff_viewer_state_v1';
    const SAVE_DEBOUNCE_MS = 180;
    const state = { leftName: '', rightName: '', diffData: null, viewMode: 'side', compareMode: 'text', ignorePatternsRaw: '', ignorePanelOpen: false, ignorePatternsEnabled: true, saveTimer: null };
    const els = {
      compareMode: document.getElementById('compareMode'),
      ignorePanel: document.getElementById('ignorePanel'),
      toggleIgnoreBtn: document.getElementById('toggleIgnoreBtn'),
      toggleIgnoreActiveBtn: document.getElementById('toggleIgnoreActiveBtn'),
      ignoreBadge: document.getElementById('ignoreBadge'),
      ignorePatterns: document.getElementById('ignorePatterns'),
      ignoreMeta: document.getElementById('ignoreMeta'),
      leftFile: document.getElementById('leftFile'),
      rightFile: document.getElementById('rightFile'),
      leftText: document.getElementById('leftText'),
      rightText: document.getElementById('rightText'),
      leftName: document.getElementById('leftName'),
      rightName: document.getElementById('rightName'),
      leftMeta: document.getElementById('leftMeta'),
      rightMeta: document.getElementById('rightMeta'),
      resultBody: document.getElementById('resultBody'),
      computeBtn: document.getElementById('computeBtn'),
      downloadBtn: document.getElementById('downloadBtn'),
      swapBtn: document.getElementById('swapBtn'),
      clearBtn: document.getElementById('clearBtn'),
      stats: document.getElementById('stats'),
      leftDrop: document.getElementById('leftDrop'),
      rightDrop: document.getElementById('rightDrop'),
      viewSideBtn: document.getElementById('viewSideBtn'),
      viewUnifiedBtn: document.getElementById('viewUnifiedBtn')
    };
    function escapeHtml(s) { return (s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
    function normalizeLines(text) { return text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n'); }
    function buildIgnorePatternInfo() {
      if (!state.ignorePatternsEnabled) return { compiled: [], warnings: [], storedCount: normalizeLines(els.ignorePatterns.value || '').map(line => line.trim()).filter(Boolean).length, enabled: false };
      const lines = normalizeLines(els.ignorePatterns.value || '');
      const compiled = [];
      const warnings = [];
      for (let index = 0; index < lines.length; index++) {
        const raw = lines[index].trim();
        if (!raw) continue;
        let regex;
        try {
          const slashMatch = raw.match(/^\/(.+)\/([a-z]*)$/i);
          if (slashMatch) {
            let flags = slashMatch[2] || '';
            if (!flags.includes('g')) flags += 'g';
            regex = new RegExp(slashMatch[1], flags);
          } else {
            regex = new RegExp(raw, 'gu');
          }
          regex.lastIndex = 0;
          if (regex.test('')) {
            warnings.push(`Line ${index + 1}: pattern matches empty string and was skipped`);
            continue;
          }
          compiled.push({ regex, token: `[ignored:${compiled.length + 1}]`, source: raw });
        } catch (error) {
          warnings.push(`Line ${index + 1}: ${error.message}`);
        }
      }
      return { compiled, warnings, storedCount: compiled.length, enabled: true };
    }
    function applyIgnorePatterns(text, patternInfo) {
      let out = text;
      for (const entry of patternInfo.compiled) {
        entry.regex.lastIndex = 0;
        out = out.replace(entry.regex, entry.token);
      }
      return out;
    }
    function buildIgnoredSegments(text, patternInfo) {
      let segments = [{ ignored: false, raw: text, compare: text }];
      for (const entry of patternInfo.compiled) {
        const next = [];
        for (const segment of segments) {
          if (segment.ignored || !segment.raw) {
            next.push(segment);
            continue;
          }
          entry.regex.lastIndex = 0;
          let cursor = 0;
          let match;
          while ((match = entry.regex.exec(segment.raw)) !== null) {
            const matchedText = match[0];
            if (!matchedText) break;
            if (match.index > cursor) {
              const rawText = segment.raw.slice(cursor, match.index);
              next.push({ ignored: false, raw: rawText, compare: rawText });
            }
            next.push({ ignored: true, raw: matchedText, compare: entry.token });
            cursor = match.index + matchedText.length;
          }
          if (cursor < segment.raw.length) {
            const rawText = segment.raw.slice(cursor);
            next.push({ ignored: false, raw: rawText, compare: rawText });
          }
        }
        segments = next;
      }
      return segments;
    }
    function buildInlineDiffUnits(text, patternInfo) {
      const segments = buildIgnoredSegments(text, patternInfo);
      const units = [];
      for (const segment of segments) {
        if (!segment.raw) continue;
        if (segment.ignored) {
          units.push({ kind: 'ignored', raw: segment.raw, compare: segment.compare });
          continue;
        }
        for (const ch of Array.from(segment.raw)) units.push({ kind: 'text', raw: ch, compare: ch });
      }
      return units;
    }
    function cloneIgnoreEntry(entry, token) {
      const flags = entry.regex.flags.includes('g') ? entry.regex.flags : `${entry.regex.flags}g`;
      return { regex: new RegExp(entry.regex.source, flags), token, source: entry.source };
    }
    function buildLogInlinePatternInfo(patternInfo) {
      const compiled = [];
      let tokenIndex = 1;
      const builtinEntries = [
        { regex: /^\d{4}-\d{2}-\d{2}[T ][0-9:.]+(?:Z|[+-]\d{2}:?\d{2})?/gu, source: 'log:timestamp' },
        { regex: /^\d{2}:\d{2}:\d{2}(?:[.,]\d{3,6})?/gu, source: 'log:time' },
        { regex: /\[[^\]]+\]/gu, source: 'log:thread' }
      ];
      for (const entry of builtinEntries) {
        compiled.push(cloneIgnoreEntry(entry, `[ignored:${tokenIndex++}]`));
      }
      for (const entry of patternInfo.compiled) {
        compiled.push(cloneIgnoreEntry(entry, `[ignored:${tokenIndex++}]`));
      }
      return { compiled, warnings: patternInfo.warnings, storedCount: patternInfo.storedCount, enabled: patternInfo.enabled };
    }
    function updateIgnoreMeta(patternInfo) {
      if (!patternInfo.compiled.length && !patternInfo.warnings.length) {
        const hasStoredPatterns = !patternInfo.enabled && patternInfo.storedCount > 0;
        els.ignoreMeta.textContent = hasStoredPatterns ? `${patternInfo.storedCount} stored pattern${patternInfo.storedCount === 1 ? '' : 's'}, inactive` : 'No ignore patterns';
        els.ignoreBadge.textContent = hasStoredPatterns ? String(patternInfo.storedCount) : '0';
        els.ignoreBadge.classList.toggle('visible', hasStoredPatterns);
        els.ignoreBadge.classList.toggle('inactive', hasStoredPatterns);
        return;
      }
      if (patternInfo.warnings.length) {
        els.ignoreMeta.textContent = `${patternInfo.compiled.length} active, ${patternInfo.warnings.length} invalid`;
      } else {
        els.ignoreMeta.textContent = `${patternInfo.compiled.length} active pattern${patternInfo.compiled.length === 1 ? '' : 's'}`;
      }
      els.ignoreBadge.textContent = String(patternInfo.compiled.length);
      els.ignoreBadge.classList.toggle('visible', patternInfo.compiled.length > 0);
      els.ignoreBadge.classList.toggle('inactive', !patternInfo.enabled);
    }
    function updateIgnorePanelVisibility() {
      els.ignorePanel.classList.toggle('open', state.ignorePanelOpen);
      els.toggleIgnoreBtn.classList.toggle('active', state.ignorePanelOpen);
      els.toggleIgnoreBtn.setAttribute('aria-expanded', state.ignorePanelOpen ? 'true' : 'false');
    }
    function updateIgnoreEnabledButton() {
      els.toggleIgnoreActiveBtn.textContent = state.ignorePatternsEnabled ? 'Patterns on' : 'Patterns off';
      els.toggleIgnoreActiveBtn.classList.toggle('active', state.ignorePatternsEnabled);
    }
    function scheduleSave() {
      clearTimeout(state.saveTimer);
      state.saveTimer = setTimeout(saveStateNow, SAVE_DEBOUNCE_MS);
    }
    function saveStateNow() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          leftText: els.leftText.value,
          rightText: els.rightText.value,
          leftName: state.leftName,
          rightName: state.rightName,
          leftMeta: els.leftMeta.textContent,
          rightMeta: els.rightMeta.textContent,
          ignorePatterns: els.ignorePatterns.value,
          ignorePanelOpen: state.ignorePanelOpen,
          ignorePatternsEnabled: state.ignorePatternsEnabled,
          compareMode: state.compareMode,
          viewMode: state.viewMode
        }));
      } catch {}
    }
    function restoreState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const saved = JSON.parse(raw);
        if (typeof saved.leftText === 'string') els.leftText.value = saved.leftText;

        if (item.sign === '+') cls = item.kind === 'changed' ? 'u-change' : 'u-add';
        else if (item.sign === '-') cls = item.kind === 'changed' ? 'u-change' : 'u-del';
        else if (item.sign === 'meta') cls = 'u-meta';
        return `<div class="u-line ${cls}"><div class="u-sign">${escapeHtml(item.sign)}</div><div class="u-code">${item.html ?? escapeHtml(item.text)}</div></div>`;
      }).join('');
      const ignoreMeta = patternInfo.compiled.length ? `Ignore patterns: ${escapeHtml(patternInfo.compiled.map(item => item.source).join(' | '))}<br />` : '';
      return `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Unified diff</title><style>:root{--text:#334155;--muted:#64748b;--border:#e7e5e4;--add-bg:#ecfdf5;--del-bg:#ecfdf5;--change-bg:#fffbeb;--meta-bg:#eff6ff;--shadow:0 8px 24px rgba(15,23,42,.06)}*{box-sizing:border-box}body{margin:0;color:var(--text);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;background:#ffffff}.wrap{width:100%;max-width:none;margin:0;padding:24px}h1{margin:0 0 10px;font-size:24px;font-family:system-ui,sans-serif;color:#1f2937}.meta{color:var(--muted);margin-bottom:18px;font-family:system-ui,sans-serif;line-height:1.45}.box{border:1px solid var(--border);border-radius:16px;overflow:hidden;background:#ffffff;box-shadow:var(--shadow)}.u-line{display:grid;grid-template-columns:42px 1fr;border-bottom:1px solid #f1f5f9;font-size:13px;line-height:1.5}.u-sign{text-align:center;padding:6px 4px;color:var(--muted);border-right:1px solid #f1f5f9;background:#fff;user-select:none}.u-code{padding:6px 10px;white-space:pre-wrap;word-break:break-word;overflow-wrap:anywhere}.u-add .u-code{background:var(--add-bg)}.u-del .u-code{background:var(--del-bg)}.u-change .u-code{background:var(--change-bg)}.u-meta .u-code{color:#2563eb;background:var(--meta-bg)}.seg-add{background:#bbf7d0;border-radius:3px}.seg-del{background:#fde68a;border-radius:3px}@media (max-width:700px){.wrap{padding:16px}.u-line{grid-template-columns:34px 1fr}}</style></head><body><div class="wrap"><h1>Unified diff</h1><div class="meta">Left: ${escapeHtml(state.leftName || 'left.txt')}<br />Right: ${escapeHtml(state.rightName || 'right.txt')}<br />Compare mode: ${escapeHtml(state.compareMode)}<br />${ignoreMeta}View: unified</div><div class="box">${unifiedRows}</div></div></body></html>`;
    }
    function downloadUnifiedHtml() {
      if (!state.diffData) return;
      const content = buildExportHtml(state.diffData), blob = new Blob([content], { type: 'text/html;charset=utf-8' }), url = URL.createObjectURL(blob), a = document.createElement('a');
      const leftBase = (state.leftName || 'left').replace(/[^\w.-]+/g, '_'), rightBase = (state.rightName || 'right').replace(/[^\w.-]+/g, '_');
      a.href = url;
      a.download = `unified_diff__${state.compareMode}__${leftBase}__vs__${rightBase}.html`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }
    function computeDiff() {
      const left = els.leftText.value, right = els.rightText.value;
      state.compareMode = els.compareMode.value;
      const patternInfo = buildIgnorePatternInfo();
      updateIgnoreMeta(patternInfo);
      try {
        let data;
        if (state.compareMode === 'env') data = buildEnvDiff(left, right, patternInfo);
        else if (state.compareMode === 'log') data = buildLogDiff(left, right, patternInfo);
        else if (state.compareMode === 'json') data = buildStructuredObjectDiff(parseJsonText(left), parseJsonText(right), patternInfo);
        else if (state.compareMode === 'yaml') data = buildStructuredObjectDiff(parseYamlText(left), parseYamlText(right), patternInfo);
        else data = buildTextDiff(left, right, patternInfo);
        state.diffData = data;
        renderDiff(data);
        els.downloadBtn.disabled = false;
        scheduleSave();
      } catch (error) {
        renderError(`${state.compareMode.toUpperCase()} compare error: ${error.message}`);
        scheduleSave();
      }
    }
    function setViewMode(mode) {
      state.viewMode = mode;
      const sideView = document.getElementById('sideView'), unifiedView = document.getElementById('unifiedView');
      if (sideView) sideView.classList.toggle('active', mode === 'side');
      if (unifiedView) unifiedView.classList.toggle('active', mode === 'unified');
      updateViewButtons();
      refreshOverview();
      scheduleSave();
    }
    function updateViewButtons() {
      els.viewSideBtn.classList.toggle('active', state.viewMode === 'side');
      els.viewUnifiedBtn.classList.toggle('active', state.viewMode === 'unified');
    }
    function getOverviewRefs() {
      return {
        railEl: document.getElementById('overviewRail'),
        markersEl: document.getElementById('overviewMarkers'),
        viewportEl: document.getElementById('overviewViewport')
      };
    }
    function getActiveOverviewRows() {
      const activeView = document.querySelector('.view-block.active');
      if (!activeView) return [];
      if (activeView.id === 'unifiedView') return Array.from(activeView.querySelectorAll('.u-line[data-kind]'));
      return Array.from(activeView.querySelectorAll('.diff-row[data-kind]'));
    }
    function updateOverviewViewport() {
      const { railEl, viewportEl } = getOverviewRefs();
      if (!railEl || !viewportEl) return;
      const docEl = document.documentElement;
      const maxScroll = Math.max(0, docEl.scrollHeight - window.innerHeight);
      const railHeight = railEl.clientHeight;
      const thumbHeight = Math.max(18, railHeight * (window.innerHeight / Math.max(docEl.scrollHeight, 1)));
      const top = maxScroll > 0 ? ((railHeight - thumbHeight) * window.scrollY / maxScroll) : 0;
      viewportEl.style.height = `${thumbHeight}px`;
      viewportEl.style.transform = `translateY(${top}px)`;
    }
    function refreshOverview() {
      const { markersEl } = getOverviewRefs();
      if (!markersEl) return;
      const rows = getActiveOverviewRows();
      const activeView = document.querySelector('.view-block.active');
      if (!activeView || !rows.length) {
        markersEl.innerHTML = '';
        updateOverviewViewport();
        return;
      }
      const docEl = document.documentElement;
      const contentHeight = Math.max(docEl.scrollHeight, 1);
      const markers = [];
      for (const row of rows) {
        const kind = row.dataset.kind;
        if (kind !== 'added' && kind !== 'deleted' && kind !== 'changed') continue;
        const rowTop = row.getBoundingClientRect().top + window.scrollY;
        const topPct = (rowTop / contentHeight) * 100;
        const heightPct = Math.max((row.offsetHeight / contentHeight) * 100, 0.35);
        const clampedTopPct = Math.min(Math.max(topPct, 0), 99.65);
        const clampedHeightPct = Math.min(heightPct, 100 - clampedTopPct);
        const cls = kind === 'changed' ? 'changed' : 'added';
        markers.push(`<div class="overview-marker ${cls}" style="top:${clampedTopPct}%;height:${clampedHeightPct}%"></div>`);
      }
      markersEl.innerHTML = markers.join('');
      updateOverviewViewport();
    }
    function setupOverview() {
      const { railEl } = getOverviewRefs();
      if (!railEl) return;
      if (!railEl.dataset.overviewBound) {
        const scrollFromClientY = clientY => {
          const currentRail = document.getElementById('overviewRail');
          if (!currentRail) return;
          const docEl = document.documentElement;
          const rect = currentRail.getBoundingClientRect();
          const ratio = Math.min(Math.max((clientY - rect.top) / Math.max(rect.height, 1), 0), 1);
          window.scrollTo({ top: ratio * Math.max(docEl.scrollHeight - window.innerHeight, 0), behavior: 'auto' });
        };
        railEl.addEventListener('click', event => {
          scrollFromClientY(event.clientY);
        });
        railEl.addEventListener('pointerdown', event => {
          event.preventDefault();
          scrollFromClientY(event.clientY);
          const move = moveEvent => scrollFromClientY(moveEvent.clientY);
          const stop = () => {
            window.removeEventListener('pointermove', move);
            window.removeEventListener('pointerup', stop);
          };
          window.addEventListener('pointermove', move);
          window.addEventListener('pointerup', stop);
        });
        railEl.dataset.overviewBound = 'true';
      }
      requestAnimationFrame(refreshOverview);
    }
    function clearAll() {
      els.leftFile.value = ''; els.rightFile.value = ''; els.leftText.value = ''; els.rightText.value = '';
      state.leftName = ''; state.rightName = ''; state.diffData = null; state.viewMode = 'side'; state.compareMode = 'text'; state.ignorePanelOpen = false; state.ignorePatternsEnabled = true;
      els.compareMode.value = 'text'; els.leftName.textContent = '-'; els.rightName.textContent = '-'; els.leftMeta.textContent = 'not loaded'; els.rightMeta.textContent = 'not loaded';
      els.resultBody.innerHTML = '<div class="empty">Nothing to show yet. Load two files and click "Generate diff".</div>';
      els.stats.innerHTML = `<span class="badge">unchanged: 0</span><span class="badge">added: 0</span><span class="badge">removed: 0</span><span class="badge">changed: 0</span>`;
      els.ignorePatterns.value = '';
      els.ignoreMeta.textContent = 'No ignore patterns';
      els.downloadBtn.disabled = true;
      updateIgnorePanelVisibility();
      updateIgnoreEnabledButton();
      updateViewButtons();
      scheduleSave();
    }
    els.computeBtn.addEventListener('click', computeDiff);
    els.downloadBtn.addEventListener('click', downloadUnifiedHtml);
    els.toggleIgnoreBtn.addEventListener('click', () => {
      state.ignorePanelOpen = !state.ignorePanelOpen;
      updateIgnorePanelVisibility();
      scheduleSave();
    });
    els.toggleIgnoreActiveBtn.addEventListener('click', () => {
      state.ignorePatternsEnabled = !state.ignorePatternsEnabled;
      updateIgnoreEnabledButton();
      computeDiff();
    });
    els.swapBtn.addEventListener('click', () => {
      [els.leftText.value, els.rightText.value] = [els.rightText.value, els.leftText.value];
      [state.leftName, state.rightName] = [state.rightName, state.leftName];
      els.leftName.textContent = state.leftName || '-';
      els.rightName.textContent = state.rightName || '-';
      computeDiff();
    });
    els.clearBtn.addEventListener('click', clearAll);
    els.viewSideBtn.addEventListener('click', () => setViewMode('side'));
    els.viewUnifiedBtn.addEventListener('click', () => setViewMode('unified'));
    els.compareMode.addEventListener('change', () => { state.compareMode = els.compareMode.value; computeDiff(); });
    els.leftText.addEventListener('input', scheduleSave);
    els.rightText.addEventListener('input', scheduleSave);
    els.ignorePatterns.addEventListener('input', () => { state.ignorePatternsRaw = els.ignorePatterns.value; scheduleSave(); computeDiff(); });
    attachDropZone(els.leftDrop, els.leftFile, 'left');
    attachDropZone(els.rightDrop, els.rightFile, 'right');
    restoreState();
    updateIgnorePanelVisibility();
    updateIgnoreEnabledButton();
    updateViewButtons();
    if (els.leftText.value || els.rightText.value) computeDiff();
    window.addEventListener('scroll', updateOverviewViewport, { passive: true });
    window.addEventListener('resize', refreshOverview);
    window.addEventListener('beforeunload', saveStateNow);
  </script>
</body>
</html>
